interface:
  display_name: "Configure"
  short_description: "Sets up or edits the plugin configuration file..."
  brand_color: "#2563EB"
  default_prompt: "Use $maxinger15-music:configure for this music workflow task."

dependencies:
  tools:
    - type: "mcp"
      value: "maxinger15-music-mcp"
      description: "Structured album, track, config, and processing tools for maxinger15 Music."
      transport: "stdio"

policy:
  allow_implicit_invocation: true
