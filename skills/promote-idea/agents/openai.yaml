interface:
  display_name: "Promote Idea"
  short_description: "Converts an album idea from IDEAS.md into an actual album..."
  brand_color: "#2563EB"
  default_prompt: "Use $maxinger15-music:promote-idea for this music workflow task."

dependencies:
  tools:
    - type: "mcp"
      value: "maxinger15-music-mcp"
      description: "Structured album, track, config, and processing tools for maxinger15 Music."
      transport: "stdio"

policy:
  allow_implicit_invocation: true
